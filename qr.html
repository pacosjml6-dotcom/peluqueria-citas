<!DOCTYPE html>
<html lang="es" class="public-page">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Código QR · Reservar cita</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=31">
</head>
<body class="public-booking-body">
  <main class="qr-page">
    <div class="qr-card card">
      <h1 class="public-booking-title">Escanea para reservar tu cita</h1>
      <p class="public-booking-subtitle">Apunta la cámara del móvil al código</p>
      <div id="qr-canvas-wrap" class="qr-canvas-wrap"></div>
      <p class="qr-link" id="qr-link"></p>
    </div>
  </main>

  <script type="module">
    import QRCode from 'https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm';

    const targetUrl = new URL('reservar.html', window.location.href).href;
    document.getElementById('qr-link').textContent = targetUrl;

    const canvas = document.createElement('canvas');
    document.getElementById('qr-canvas-wrap').appendChild(canvas);
    try {
      await QRCode.toCanvas(canvas, targetUrl, {
        width: 360,
        margin: 1,
        color: { dark: '#0f172a', light: '#ffffff' }
      });
    } catch (error) {
      document.getElementById('qr-canvas-wrap').textContent = 'No se pudo generar el código QR.';
      console.error(error);
    }
  </script>
</body>
</html>

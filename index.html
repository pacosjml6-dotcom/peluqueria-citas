<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bella Studio · Gestión de Citas</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-icon">✂️</span>
        <div>
          <h1>Bella Studio</h1>
          <p>Gestión de citas</p>
        </div>
      </div>
      <nav class="tabs">
        <button id="tab-agenda" class="tab-btn active" type="button">Agenda</button>
        <button id="tab-clients" class="tab-btn" type="button">Clientes</button>
      </nav>
      <button id="btn-new-appt" class="btn btn-primary">
        <span class="btn-icon-inline">+</span> Nueva cita
      </button>
      <button id="btn-new-client" class="btn btn-primary hidden">
        <span class="btn-icon-inline">+</span> Nuevo cliente
      </button>
    </header>

    <main class="app-main" id="view-agenda">
      <section class="calendar-card card">
        <div class="calendar-header">
          <button id="btn-prev-month" class="btn-icon" aria-label="Mes anterior">&#8249;</button>
          <h2 id="calendar-title">Mes</h2>
          <button id="btn-next-month" class="btn-icon" aria-label="Mes siguiente">&#8250;</button>
        </div>
        <div class="calendar-weekdays">
          <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>

      <section class="agenda-card card">
        <div class="agenda-header">
          <h2 id="agenda-title">Agenda de hoy</h2>
          <button id="btn-today" class="btn btn-ghost">Hoy</button>
        </div>
        <div id="appointments-list" class="appointments-list"></div>
      </section>
    </main>

    <main class="clients-view hidden" id="view-clients">
      <section class="clients-card card">
        <div class="clients-header">
          <h2>Clientes</h2>
        </div>
        <div id="clients-list" class="clients-list"></div>
      </section>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">Nueva cita</h3>
        <button id="btn-close-modal" class="btn-icon" aria-label="Cerrar">&times;</button>
      </div>
      <form id="appt-form" class="appt-form">
        <input type="hidden" id="appt-id">
        <label>Nombre del cliente
          <input type="text" id="appt-name" required placeholder="Ej. Laura Gómez">
        </label>
        <label>Teléfono de contacto
          <input type="tel" id="appt-phone" required placeholder="Ej. 600 123 456">
        </label>
        <div class="form-row">
          <label>Fecha
            <input type="date" id="appt-date" required>
          </label>
          <label>Hora
            <input type="time" id="appt-time" required>
          </label>
        </div>
        <label>Servicio / Notas
          <textarea id="appt-notes" rows="2" placeholder="Ej. Corte + Tinte"></textarea>
        </label>
        <div class="form-actions">
          <button type="button" id="btn-delete-appt" class="btn btn-danger hidden">Eliminar</button>
          <div class="form-actions-right">
            <button type="button" id="btn-cancel-form" class="btn btn-ghost">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="confirm-overlay" class="modal-overlay hidden">
    <div class="modal modal-sm" role="alertdialog" aria-modal="true" aria-labelledby="confirm-title">
      <h3 id="confirm-title">¿Eliminar cita?</h3>
      <p id="confirm-message" class="confirm-message"></p>
      <div class="form-actions">
        <button id="btn-confirm-cancel" class="btn btn-ghost">Cancelar</button>
        <button id="btn-confirm-delete" class="btn btn-danger">Eliminar</button>
      </div>
    </div>
  </div>

  <div id="client-modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="client-modal-title">
      <div class="modal-header">
        <h3 id="client-modal-title">Nuevo cliente</h3>
        <button id="btn-close-client-modal" class="btn-icon" aria-label="Cerrar">&times;</button>
      </div>
      <form id="client-form" class="appt-form">
        <input type="hidden" id="client-id">
        <label>Nombre completo
          <input type="text" id="client-name" required maxlength="120" placeholder="Ej. Laura Gómez Martínez">
        </label>
        <label>
          <span class="field-icons-row">
            <span class="field-icon" title="Teléfono" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.9 21 3 13.1 3 3c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1.1L6.6 10.8z"/></svg>
            </span>
            <span class="field-icon field-icon-whatsapp" title="WhatsApp" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.1.1-1.8-.1-.4-.1-1-.3-1.6-.6-2.9-1.2-4.7-4.1-4.9-4.3-.1-.2-1.2-1.6-1.2-3 0-1.4.7-2.1 1-2.4.3-.3.6-.4.8-.4h.6c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9.1.2.1.3 0 .5-.1.2-.2.3-.3.5-.2.2-.3.3-.1.6.2.3.9 1.4 1.9 2.3 1.3 1.1 2.4 1.5 2.7 1.6.3.1.5.1.6-.1.2-.2.7-.8.9-1.1.2-.3.4-.2.6-.1.2.1 1.5.7 1.8.8.3.1.5.2.5.3.1.2.1.6-.1 1.2z"/></svg>
            </span>
          </span>
          Teléfono
          <div class="phone-row">
            <select id="client-phone-code" class="phone-code-select" aria-label="Prefijo del país"></select>
            <input type="tel" id="client-phone" required placeholder="600 123 456">
          </div>
        </label>
        <label>
          <span class="field-icons-row">
            <span class="field-icon" title="Correo electrónico" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm0 2v.2l8 5.3 8-5.3V6H4zm16 12V8.6l-7.4 4.9a1 1 0 0 1-1.2 0L4 8.6V18h16z"/></svg>
            </span>
          </span>
          Correo electrónico
          <input type="email" id="client-email" required placeholder="Ej. laura@email.com">
        </label>
        <div class="form-actions">
          <button type="button" id="btn-delete-client" class="btn btn-danger hidden">Eliminar</button>
          <div class="form-actions-right">
            <button type="button" id="btn-cancel-client-form" class="btn btn-ghost">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div id="client-confirm-overlay" class="modal-overlay hidden">
    <div class="modal modal-sm" role="alertdialog" aria-modal="true" aria-labelledby="client-confirm-title">
      <h3 id="client-confirm-title">¿Eliminar cliente?</h3>
      <p id="client-confirm-message" class="confirm-message"></p>
      <div class="form-actions">
        <button id="btn-client-confirm-cancel" class="btn btn-ghost">Cancelar</button>
        <button id="btn-client-confirm-delete" class="btn btn-danger">Eliminar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/store.js"></script>
  <script src="js/countries.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/appointments.js"></script>
  <script src="js/clients.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
